name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  release:
    types: [ created ]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bundle Leaflet into app assets (for offline use)
        run: |
          mkdir -p app/src/main/assets/web/vendor
          curl -sSL https://unpkg.com/leaflet@1.9.4/dist/leaflet.js  -o app/src/main/assets/web/vendor/leaflet.js
          curl -sSL https://unpkg.com/leaflet@1.9.4/dist/leaflet.css -o app/src/main/assets/web/vendor/leaflet.css
          echo "leaflet.js $(wc -c < app/src/main/assets/web/vendor/leaflet.js) bytes"
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''
      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flock-radar-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
